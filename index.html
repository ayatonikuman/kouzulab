<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>構図Lab — パース・配置検討</title>
<style>
  :root{
    --bg:#1a1c20; --bar:#24262cee; --fg:#e8eaed; --sub:#9aa0a6;
    --accent:#8ab4f8; --accent2:#3d5afe;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--fg);
    font-family:-apple-system,"Hiragino Sans",sans-serif;touch-action:none;}
  canvas{display:block;}
  #view{position:fixed;inset:0;}
  /* ---- bars ---- */
  .bar{position:fixed;left:0;right:0;z-index:20;display:flex;align-items:center;gap:8px;
    padding:8px 10px;background:var(--bar);backdrop-filter:blur(8px);flex-wrap:wrap;}
  #topbar{top:0;font-size:13px;}
  #bottombar{bottom:0;justify-content:center;}
  .bar label{display:flex;align-items:center;gap:4px;color:var(--sub);white-space:nowrap;}
  button, select{
    min-height:40px;padding:0 14px;border-radius:10px;border:1px solid #3a3f4a;
    background:#2b2e36;color:var(--fg);font-size:14px;font-family:inherit;
  }
  button:active{background:#3a3f4a;}
  button.primary{background:var(--accent2);border-color:var(--accent2);font-weight:600;}
  button.toggled{background:var(--accent);color:#111;border-color:var(--accent);font-weight:600;}
  button:disabled{opacity:.35;}
  .seg{display:flex;border-radius:10px;overflow:hidden;border:1px solid #3a3f4a;}
  .seg button{border:none;border-radius:0;min-width:56px;}
  .seg button.on{background:var(--accent);color:#111;font-weight:600;}
  input[type=range]{width:110px;}
  .title{font-weight:700;color:var(--accent);margin-right:4px;}
  #camH{min-width:52px;display:inline-block;color:var(--fg);}
  /* ---- frame overlay ---- */
  #frame{position:fixed;z-index:10;pointer-events:none;
    border:1.5px solid rgba(255,255,255,.85);
    box-shadow:0 0 0 100000px rgba(0,0,0,.45);}
  #frame .t{position:absolute;left:0;right:0;border-top:1px solid rgba(255,255,255,.18);}
  #frame .v{position:absolute;top:0;bottom:0;border-left:1px solid rgba(255,255,255,.18);}
  #frame.no3 .t, #frame.no3 .v{display:none;}
  #diag{position:absolute;left:0;top:0;width:100%;height:100%;display:none;}
  #frame.gd #diag{display:block;}
  #diag line{stroke:rgba(255,255,255,.18);stroke-width:1;vector-effect:non-scaling-stroke;}
  body.flip #view, body.flip #overlay, body.flip #frame{transform:scaleX(-1);}
  input[type=number]{min-height:40px;border-radius:10px;border:1px solid #3a3f4a;
    background:#2b2e36;color:var(--fg);font-size:14px;padding:0 8px;font-family:inherit;}
  /* ---- horizon ---- */
  #overlay{position:fixed;inset:0;z-index:11;pointer-events:none;}
  #toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%);z-index:30;
    background:#000c;color:#fff;padding:10px 18px;border-radius:20px;font-size:13px;
    opacity:0;transition:opacity .3s;pointer-events:none;max-width:90vw;text-align:center;}
</style>
</head>
<body>
<div id="view"></div>

<svg id="overlay">
  <line id="hline" x1="0" y1="-10" x2="0" y2="-10" stroke="#4dd0e1" stroke-width="1" stroke-dasharray="6 4" opacity=".8"/>
  <text id="htext" x="0" y="-10" fill="#4dd0e1" font-size="11" opacity=".9">アイレベル</text>
</svg>
<div id="frame"><div class="t" style="top:33.33%"></div><div class="t" style="top:66.66%"></div>
<div class="v" style="left:33.33%"></div><div class="v" style="left:66.66%"></div>
<svg id="diag" viewBox="0 0 100 100" preserveAspectRatio="none">
<line x1="0" y1="0" x2="100" y2="100"/><line x1="100" y1="0" x2="0" y2="100"/></svg></div>

<div id="topbar" class="bar">
  <span class="title">構図Lab</span>
  <label>画角 <input type="range" id="fov" min="15" max="100" value="50"><span id="fovVal">50°</span></label>
  <button id="fishBtn">魚眼</button>
  <label><input type="range" id="fish" min="0" max="100" value="60"><span id="fishVal">60</span></label>
  <label>カメラ高 <span id="camH">-</span></label>
  <label>視点
    <select id="campreset">
      <option value="" selected>—</option>
      <option value="eye">目線1.6m</option>
      <option value="low">あおり</option>
      <option value="high">俯瞰</option>
      <option value="top">真俯瞰</option>
    </select>
  </label>
  <button id="vpBtn">パース線</button>
  <button id="guideBtn">ガイド</button>
  <button id="flipBtn">反転</button>
  <label>枠
    <select id="aspect">
      <option value="3,4">3:4 縦</option>
      <option value="4,3" selected>4:3 横</option>
      <option value="1,1">1:1</option>
      <option value="9,16">9:16 縦</option>
      <option value="16,9">16:9 横</option>
      <option value="210,297">A4 縦</option>
      <option value="297,210">A4 横</option>
    </select>
  </label>
  <label>解像度
    <select id="res"><option value="1000">1000px</option><option value="2000" selected>2000px</option><option value="3000">3000px</option></select>
  </label>
  <label><input type="checkbox" id="guidesExport" checked>ガイド込み</label>
  <button class="primary" id="exportBtn">PNG書き出し</button>
  <button id="resetBtn">リセット</button>
</div>

<div id="bottombar" class="bar">
  <button id="addBox">＋箱</button>
  <button id="addImg">＋画像</button>
  <button id="addFloorImg">＋床画像</button>
  <button id="addFig">＋人</button>
  <button id="roomBtn">部屋</button>
  <button id="texBtn" disabled>貼付</button>
  <input type="file" id="imgFile" accept="image/png,image/jpeg" style="display:none">
  <div class="seg">
    <button id="mTranslate" class="on">移動</button>
    <button id="mRotate">回転</button>
    <button id="mScale">拡縮</button>
  </div>
  <button id="snapBtn">スナップ</button>
  <button id="dupBtn" disabled>複製</button>
  <button id="delBtn" disabled>削除</button>
  <label id="hLabel" style="display:none">身長 <input type="number" id="heightIn" min="10" max="1000" step="5" style="width:64px">cm</label>
  <label>不透明 <input type="range" id="opacity" min="10" max="100" value="100" disabled style="width:80px"></label>
  <button id="lockBtn">カメラ固定</button>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
<script>
(function(){
'use strict';
var $ = function(id){ return document.getElementById(id); };

/* ---------- renderer / scene ---------- */
var renderer = new THREE.WebGLRenderer({antialias:true, preserveDrawingBuffer:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.setClearColor(0x1a1c20);
$('view').appendChild(renderer.domElement);

var scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x1a1c20, 40, 90);

var camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.05, 500);
camera.position.set(5, 2.0, 7);

scene.add(new THREE.HemisphereLight(0xdde4ff, 0x3a3428, 0.9));
var dl = new THREE.DirectionalLight(0xffffff, 0.55);
dl.position.set(4, 8, 5);
scene.add(dl);

var ground = new THREE.Mesh(
  new THREE.PlaneGeometry(120,120).rotateX(-Math.PI/2),
  new THREE.MeshLambertMaterial({color:0x24262c})
);
ground.position.y = -0.01;
scene.add(ground);
var grid = new THREE.GridHelper(60, 60, 0x5a6172, 0x363b46);
scene.add(grid);

/* ---------- controls ---------- */
var orbit = new THREE.OrbitControls(camera, renderer.domElement);
orbit.target.set(0, 1, 0);
orbit.enableDamping = true;
orbit.dampingFactor = 0.1;
orbit.screenSpacePanning = true;
orbit.maxPolarAngle = Math.PI * 0.98;
orbit.touches = {ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN};

var transform = new THREE.TransformControls(camera, renderer.domElement);
transform.setSize(1.3);
transform.setSpace('local'); // 全モードでオブジェクトの向きに追従
scene.add(transform);
var cameraLocked = false, lastDragEnd = 0;
transform.addEventListener('dragging-changed', function(e){
  orbit.enabled = !e.value && !cameraLocked;
  if(!e.value){ lastDragEnd = Date.now(); saveScene(); }
});

/* ---------- objects ---------- */
var objects = [];   // selectable meshes
var selected = null;
var COLORS = [0x8ab4f8, 0xf28b82, 0xfdd663, 0x81c995, 0xc58af9, 0x78d9ec];
var colorIdx = 0;

function addBox(state){
  var mesh = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshLambertMaterial({color: COLORS[colorIdx++ % COLORS.length]})
  );
  var edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(mesh.geometry),
    new THREE.LineBasicMaterial({color:0x111318})
  );
  edges.raycast = function(){};
  mesh.add(edges);
  mesh.userData.type = 'box';
  if(state){
    mesh.position.fromArray(state.p);
    mesh.rotation.fromArray(state.r);
    mesh.scale.fromArray(state.s);
    if(state.c !== undefined) mesh.material.color.setHex(state.c);
    if(state.o !== undefined && state.o < 1){ mesh.material.opacity = state.o; mesh.material.transparent = true; }
  }else{
    mesh.position.set((Math.random()-0.5)*2, 0.5, (Math.random()-0.5)*2);
  }
  scene.add(mesh);
  objects.push(mesh);
  return mesh;
}

function addImagePlane(file, floor){
  var url = URL.createObjectURL(file);
  new THREE.TextureLoader().load(url, function(tex){
    tex.encoding = THREE.sRGBEncoding;
    var ar = tex.image.width / tex.image.height;
    var mesh = new THREE.Mesh(
      new THREE.PlaneGeometry(1,1),
      new THREE.MeshBasicMaterial({map:tex, transparent:true, side:THREE.DoubleSide})
    );
    mesh.userData.ar = ar;
    if(floor){
      mesh.geometry.rotateX(-Math.PI/2);
      var d = 2; // 奥行き2m基準
      mesh.scale.set(d*ar, 1, d);
      mesh.position.set(0, 0.02, 0);
      mesh.userData.type = 'floorimg';
      toast('床に画像を配置しました(奥行き2m基準)');
    }else{
      var h = 1.6; // 身長160cm相当
      mesh.scale.set(h*ar, h, 1);
      mesh.position.set(0, h/2, 0);
      mesh.userData.type = 'image';
      toast('画像を配置しました(高さ1.6m基準)');
    }
    scene.add(mesh);
    objects.push(mesh);
    select(mesh);
    URL.revokeObjectURL(url);
  }, undefined, function(){ toast('画像を読み込めませんでした'); });
}

function applyBoxTexture(file){
  var mesh = selected;
  if(!mesh || mesh.userData.type !== 'box') return;
  var url = URL.createObjectURL(file);
  new THREE.TextureLoader().load(url, function(tex){
    tex.encoding = THREE.sRGBEncoding;
    if(mesh.material.map) mesh.material.map.dispose();
    mesh.material.map = tex;
    mesh.material.color.setHex(0xffffff);
    mesh.material.needsUpdate = true;
    toast('箱に画像を貼りました');
    URL.revokeObjectURL(url);
  }, undefined, function(){ toast('画像を読み込めませんでした'); });
}

function figureCanvas(){
  var c = document.createElement('canvas');
  c.width = 128; c.height = 512;
  var x = c.getContext('2d');
  x.fillStyle = '#dde2ec';
  x.beginPath(); x.arc(64, 40, 28, 0, Math.PI*2); x.fill();               // 頭
  x.beginPath(); x.ellipse(64, 158, 33, 78, 0, 0, Math.PI*2); x.fill();   // 胴
  x.beginPath(); x.ellipse(23, 155, 10, 66, 0, 0, Math.PI*2); x.fill();   // 腕
  x.beginPath(); x.ellipse(105, 155, 10, 66, 0, 0, Math.PI*2); x.fill();
  x.beginPath(); x.ellipse(46, 372, 14, 132, 0, 0, Math.PI*2); x.fill();  // 脚
  x.beginPath(); x.ellipse(82, 372, 14, 132, 0, 0, Math.PI*2); x.fill();
  return c;
}
var FIG_AR = 128 / 512;
function addFigure(state){
  var tex = new THREE.CanvasTexture(figureCanvas());
  tex.encoding = THREE.sRGBEncoding;
  var mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(1,1),
    new THREE.MeshBasicMaterial({map:tex, transparent:true, opacity:0.9, side:THREE.DoubleSide})
  );
  mesh.userData.type = 'figure';
  mesh.userData.ar = FIG_AR;
  if(state){
    mesh.position.fromArray(state.p);
    mesh.rotation.fromArray(state.r);
    mesh.scale.fromArray(state.s);
    if(state.o !== undefined) mesh.material.opacity = state.o;
  }else{
    var h = 1.6;
    mesh.scale.set(h*FIG_AR, h, 1);
    mesh.position.set(0, h/2, 0);
  }
  scene.add(mesh);
  objects.push(mesh);
  return mesh;
}

function select(mesh){
  if(selected && selected.material.emissive) selected.material.emissive.setHex(0x000000);
  selected = mesh;
  if(mesh){
    if(mesh.material.emissive) mesh.material.emissive.setHex(0x2a3d55);
    transform.attach(mesh);
  }else{
    transform.detach();
  }
  $('dupBtn').disabled = $('delBtn').disabled = !mesh;
  $('texBtn').disabled = !(mesh && mesh.userData.type === 'box');
  $('opacity').disabled = !mesh;
  $('opacity').value = mesh ? Math.round((mesh.material.opacity || 1) * 100) : 100;
  var showH = mesh && (mesh.userData.type === 'image' || mesh.userData.type === 'figure');
  $('hLabel').style.display = showH ? '' : 'none';
  if(showH) $('heightIn').value = Math.round(mesh.scale.y * 100);
}

function removeObject(mesh){
  var i = objects.indexOf(mesh);
  if(i >= 0) objects.splice(i, 1);
  scene.remove(mesh);
  mesh.geometry.dispose();
  var map = mesh.material.map;
  // 複製でテクスチャを共有している場合があるため、他で未使用のときだけ破棄
  if(map && !objects.some(function(o){ return o.material.map === map; })) map.dispose();
  mesh.material.dispose();
}

/* ---------- tap select ---------- */
var raycaster = new THREE.Raycaster();
var downX = 0, downY = 0, moved = false;
var el = renderer.domElement;
el.addEventListener('pointerdown', function(e){ downX = e.clientX; downY = e.clientY; moved = false; });
el.addEventListener('pointermove', function(e){
  if(Math.abs(e.clientX-downX) > 6 || Math.abs(e.clientY-downY) > 6) moved = true;
});
el.addEventListener('pointerup', function(e){
  if(moved || transform.dragging || Date.now() - lastDragEnd < 250) return;
  var r = el.getBoundingClientRect();
  var cx = e.clientX - r.left;
  if(document.body.classList.contains('flip')) cx = r.width - cx; // 反転表示中は左右を戻す
  var ndc = new THREE.Vector2(
    (cx / r.width) * 2 - 1,
    -((e.clientY - r.top) / r.height) * 2 + 1
  );
  if(fishOn && fishK > 0){
    // 魚眼の歪みを逆補正してから判定(シェーダーと同じ写像)
    var a = window.innerWidth / window.innerHeight;
    var px = ndc.x * 0.5 * a, py = ndc.y * 0.5;
    var rmax2 = 0.25 * (a*a + 1);
    ndc.multiplyScalar((1 + fishK*(px*px+py*py)) / (1 + fishK*rmax2));
  }
  raycaster.setFromCamera(ndc, camera);
  var hits = raycaster.intersectObjects(objects, false);
  select(hits.length ? hits[0].object : null);
});

/* ---------- frame (canvas枠) ---------- */
var frameRect = {x:0, y:0, w:100, h:100};
function updateFrame(){
  var a = $('aspect').value.split(',').map(Number);
  var W = window.innerWidth, H = window.innerHeight;
  var top = $('topbar').offsetHeight + 10, bottom = H - $('bottombar').offsetHeight - 10;
  var availW = W - 36, availH = bottom - top;
  var s = Math.min(availW / a[0], availH / a[1]);
  frameRect.w = a[0] * s; frameRect.h = a[1] * s;
  frameRect.x = (W - frameRect.w) / 2;
  frameRect.y = top + (availH - frameRect.h) / 2;
  var f = $('frame').style;
  f.left = frameRect.x + 'px'; f.top = frameRect.y + 'px';
  f.width = frameRect.w + 'px'; f.height = frameRect.h + 'px';
}

/* ---------- horizon (アイレベル) ---------- */
var Y_AXIS = new THREE.Vector3(0,1,0);
function horizonLine(){
  var dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  var fh = new THREE.Vector3(dir.x, 0, dir.z);
  if(fh.lengthSq() < 1e-6) return null;
  fh.normalize();
  var W = window.innerWidth, H = window.innerHeight;
  function pt(ang){
    var d = fh.clone().applyAxisAngle(Y_AXIS, ang);
    var p = new THREE.Vector3(
      camera.position.x + d.x * 1e4,
      camera.position.y,
      camera.position.z + d.z * 1e4
    ).project(camera);
    return {x:(p.x*0.5+0.5)*W, y:(-p.y*0.5+0.5)*H, z:p.z};
  }
  var p1 = pt(-0.35), p2 = pt(0.35);
  // 注: far平面(500)超の点はNDC zが1を僅かに超えるため、zでの前後判定は使わない
  // (方向は常に前方水平なので投影は有効)
  if(!isFinite(p1.x) || !isFinite(p2.x)) return null;
  var dx = p2.x - p1.x;
  if(Math.abs(dx) < 1e-3) return null;
  var k = (p2.y - p1.y) / dx;
  return {y0: p1.y - k*p1.x, y1: p1.y + k*(W - p1.x)};
}
function updateHorizon(){
  var h = horizonLine();
  var line = $('hline'), text = $('htext');
  if(!h){ line.setAttribute('y1',-10); line.setAttribute('y2',-10); text.setAttribute('y',-10); return; }
  line.setAttribute('x1', 0); line.setAttribute('y1', h.y0);
  line.setAttribute('x2', window.innerWidth); line.setAttribute('y2', h.y1);
  text.setAttribute('x', window.innerWidth - 74);
  text.setAttribute('y', h.y1 - 6);
}

/* ---------- vanishing points / perspective lines ---------- */
var vpOn = false;
var svgNS = 'http://www.w3.org/2000/svg';
var vpG = document.createElementNS(svgNS, 'g');
$('overlay').appendChild(vpG);
var vpLineEls = [], vpDotEls = [];
function toScreen(v){
  var p = v.clone().project(camera);
  return {x:(p.x*0.5+0.5)*window.innerWidth, y:(-p.y*0.5+0.5)*window.innerHeight, z:p.z};
}
function vpData(){
  if(!selected || selected.userData.type !== 'box') return null;
  selected.updateMatrixWorld();
  var m = selected.matrixWorld;
  var corners = [];
  for(var i=0;i<8;i++){
    corners.push(new THREE.Vector3(i&1?0.5:-0.5, i&2?0.5:-0.5, i&4?0.5:-0.5).applyMatrix4(m));
  }
  var camDir = new THREE.Vector3();
  camera.getWorldDirection(camDir);
  var out = {segs:[], vps:[]};
  [[0,'#f28b82'],[1,'#81c995'],[2,'#8ab4f8']].forEach(function(ax){
    var d = new THREE.Vector3().setFromMatrixColumn(m, ax[0]).normalize();
    var dot = d.dot(camDir);
    if(Math.abs(dot) < 0.02) return; // 軸が画面とほぼ平行→消失点は無限遠
    if(dot < 0) d.negate();
    var vp = toScreen(camera.position.clone().add(d.multiplyScalar(1e5)));
    // 前方判定はdotで済んでいる。far超の点はz>1になるためzでは判定しない
    if(!isFinite(vp.x) || !isFinite(vp.y)) return;
    out.vps.push({x:vp.x, y:vp.y, col:ax[1]});
    for(var j=0;j<8;j++){
      var s = toScreen(corners[j]);
      if(s.z > 1) continue;
      out.segs.push({x1:s.x, y1:s.y, x2:vp.x, y2:vp.y, col:ax[1]});
    }
  });
  return out;
}
function updateVP(){
  var d = vpOn ? vpData() : null;
  if(!d){ vpG.setAttribute('display','none'); return; }
  vpG.removeAttribute('display');
  while(vpLineEls.length < d.segs.length){
    var l = document.createElementNS(svgNS, 'line');
    l.setAttribute('stroke-width', '1');
    l.setAttribute('stroke-opacity', '.45');
    vpG.appendChild(l);
    vpLineEls.push(l);
  }
  while(vpDotEls.length < d.vps.length){
    var c = document.createElementNS(svgNS, 'circle');
    c.setAttribute('r', '4');
    c.setAttribute('fill', 'none');
    c.setAttribute('stroke-width', '1.5');
    vpG.appendChild(c);
    vpDotEls.push(c);
  }
  vpLineEls.forEach(function(l, i){
    if(i < d.segs.length){
      var g = d.segs[i];
      l.removeAttribute('display');
      l.setAttribute('x1', g.x1); l.setAttribute('y1', g.y1);
      l.setAttribute('x2', g.x2); l.setAttribute('y2', g.y2);
      l.setAttribute('stroke', g.col);
    }else{
      l.setAttribute('display', 'none');
    }
  });
  vpDotEls.forEach(function(c, i){
    if(i < d.vps.length){
      c.removeAttribute('display');
      c.setAttribute('cx', d.vps[i].x); c.setAttribute('cy', d.vps[i].y);
      c.setAttribute('stroke', d.vps[i].col);
    }else{
      c.setAttribute('display', 'none');
    }
  });
}

/* ---------- fisheye post-process ---------- */
var fishK = 0, fishOn = false;
var rt = new THREE.WebGLRenderTarget(2, 2);
rt.texture.encoding = THREE.sRGBEncoding;
var postCam = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
var postScene = new THREE.Scene();
var postMat = new THREE.ShaderMaterial({
  uniforms: { tDiffuse: {value: rt.texture}, k: {value: 0}, aspect: {value: 1} },
  vertexShader: 'varying vec2 vUv; void main(){ vUv = uv; gl_Position = vec4(position.xy, 0.0, 1.0); }',
  fragmentShader: [
    'uniform sampler2D tDiffuse; uniform float k; uniform float aspect; varying vec2 vUv;',
    'void main(){',
    '  vec2 p = vUv - 0.5; p.x *= aspect;',
    '  float rmax2 = 0.25 * (aspect*aspect + 1.0);',
    '  float f = (1.0 + k * dot(p,p)) / (1.0 + k * rmax2);',
    '  p *= f; p.x /= aspect;',
    '  gl_FragColor = texture2D(tDiffuse, p + 0.5);',
    '}'
  ].join('\n'),
  depthTest: false, depthWrite: false
});
postScene.add(new THREE.Mesh(new THREE.PlaneGeometry(2,2), postMat));
function sizeRT(){
  rt.setSize(Math.round(window.innerWidth * window.devicePixelRatio),
             Math.round(window.innerHeight * window.devicePixelRatio));
}
sizeRT();
function renderFrame(){
  if(fishOn && fishK > 0){
    renderer.setRenderTarget(rt);
    renderer.render(scene, camera);
    renderer.setRenderTarget(null);
    postMat.uniforms.k.value = fishK;
    postMat.uniforms.aspect.value = window.innerWidth / window.innerHeight;
    renderer.render(postScene, postCam);
  }else{
    renderer.render(scene, camera);
  }
}

/* ---------- export ---------- */
function exportPNG(){
  var longSide = parseInt($('res').value, 10);
  var withGuides = $('guidesExport').checked;
  var W = window.innerWidth, H = window.innerHeight;
  var s = longSide / Math.max(frameRect.w, frameRect.h);
  var outW = Math.round(frameRect.w * s), outH = Math.round(frameRect.h * s);
  var hl = withGuides ? horizonLine() : null;
  var vpd = (withGuides && vpOn) ? vpData() : null;

  var sel = selected;
  if(sel) transform.detach();
  if(!withGuides) grid.visible = false;

  renderer.setPixelRatio(1);
  renderer.setSize(outW, outH, false);
  camera.setViewOffset(Math.round(W*s), Math.round(H*s), Math.round(frameRect.x*s), Math.round(frameRect.y*s), outW, outH);
  if(fishOn && fishK > 0){
    rt.setSize(outW, outH);
    renderer.setRenderTarget(rt);
    renderer.render(scene, camera);
    renderer.setRenderTarget(null);
    postMat.uniforms.k.value = fishK;
    postMat.uniforms.aspect.value = outW / outH;
    renderer.render(postScene, postCam);
  }else{
    renderer.render(scene, camera);
  }
  var url = renderer.domElement.toDataURL('image/png');

  camera.clearViewOffset();
  sizeRT();
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(W, H, false);
  grid.visible = true;
  if(sel) transform.attach(sel);

  var img = new Image();
  img.onload = function(){
    var c = document.createElement('canvas');
    c.width = outW; c.height = outH;
    var ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0);
    if(hl){
      ctx.strokeStyle = '#4dd0e1'; ctx.lineWidth = Math.max(1, s);
      ctx.setLineDash([8*s, 6*s]);
      ctx.beginPath();
      ctx.moveTo(0, (hl.y0 + (hl.y1-hl.y0) * (frameRect.x / W) - frameRect.y) * s);
      ctx.lineTo(outW, (hl.y0 + (hl.y1-hl.y0) * ((frameRect.x+frameRect.w) / W) - frameRect.y) * s);
      ctx.stroke();
    }
    if(vpd){
      ctx.setLineDash([]);
      ctx.lineWidth = Math.max(1, s * 0.8);
      ctx.globalAlpha = 0.5;
      vpd.segs.forEach(function(g){
        ctx.strokeStyle = g.col;
        ctx.beginPath();
        ctx.moveTo((g.x1 - frameRect.x) * s, (g.y1 - frameRect.y) * s);
        ctx.lineTo((g.x2 - frameRect.x) * s, (g.y2 - frameRect.y) * s);
        ctx.stroke();
      });
      ctx.globalAlpha = 1;
    }
    c.toBlob(function(blob){
      if(!blob){ toast('書き出しに失敗しました'); return; }
      var file = new File([blob], 'kouzu_' + Date.now() + '.png', {type:'image/png'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        navigator.share({files:[file]}).catch(function(){ download(blob, file.name); });
      }else{
        download(blob, file.name);
      }
    }, 'image/png');
  };
  img.src = url;
}
function download(blob, name){
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 2000);
  toast('PNGを保存しました');
}

/* ---------- save / restore ---------- */
var SAVE_KEY = 'kouzu-lab-v1';
function saveScene(){
  try{
    var data = {
      boxes: objects.filter(function(o){ return o.userData.type === 'box'; }).map(function(o){
        return {p:o.position.toArray(), r:o.rotation.toArray().slice(0,3), s:o.scale.toArray(), c:o.material.color.getHex(), o:o.material.opacity};
      }),
      figs: objects.filter(function(o){ return o.userData.type === 'figure'; }).map(function(o){
        return {p:o.position.toArray(), r:o.rotation.toArray().slice(0,3), s:o.scale.toArray(), o:o.material.opacity};
      }),
      cam: {p:camera.position.toArray(), t:orbit.target.toArray(), fov:camera.fov},
      aspect: $('aspect').value,
      fish: $('fish').value,
      fishOn: fishOn,
      vp: vpOn,
      g: guideMode
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  }catch(e){}
}
function restoreScene(){
  try{
    var raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    var d = JSON.parse(raw);
    (d.boxes || []).forEach(function(b){ addBox(b); });
    (d.figs || []).forEach(function(f){ addFigure(f); });
    if(d.cam){
      camera.position.fromArray(d.cam.p);
      orbit.target.fromArray(d.cam.t);
      camera.fov = d.cam.fov;
      camera.updateProjectionMatrix();
      $('fov').value = Math.round(d.cam.fov);
      $('fovVal').textContent = Math.round(d.cam.fov) + '°';
    }
    if(d.aspect) $('aspect').value = d.aspect;
    if(d.fish !== undefined){
      $('fish').value = d.fish;
      $('fishVal').textContent = d.fish;
    }
    if(d.fishOn){
      fishOn = true;
      $('fishBtn').classList.add('toggled');
    }
    if(d.vp){
      vpOn = true;
      $('vpBtn').classList.add('toggled');
    }
    if(d.g){
      guideMode = d.g;
      applyGuide();
    }
    return (d.boxes || []).length + (d.figs || []).length > 0;
  }catch(e){ return false; }
}
setInterval(saveScene, 4000);

/* ---------- UI ---------- */
function toast(msg){
  var t = $('toast');
  t.textContent = msg;
  t.style.opacity = 1;
  clearTimeout(t._h);
  t._h = setTimeout(function(){ t.style.opacity = 0; }, 2600);
}
$('addBox').addEventListener('click', function(){ select(addBox()); saveScene(); });
var imgMode = 'stand'; // stand | floor | tex
$('addImg').addEventListener('click', function(){ imgMode = 'stand'; $('imgFile').click(); });
$('addFloorImg').addEventListener('click', function(){ imgMode = 'floor'; $('imgFile').click(); });
$('texBtn').addEventListener('click', function(){
  if(!selected || selected.userData.type !== 'box') return;
  imgMode = 'tex';
  $('imgFile').click();
});
$('imgFile').addEventListener('change', function(e){
  var f = e.target.files[0];
  if(f){
    if(imgMode === 'tex') applyBoxTexture(f);
    else addImagePlane(f, imgMode === 'floor');
  }
  e.target.value = '';
});
$('dupBtn').addEventListener('click', function(){
  if(!selected) return;
  var copy;
  if(selected.userData.type === 'box'){
    copy = addBox({p:selected.position.toArray(), r:selected.rotation.toArray().slice(0,3),
      s:selected.scale.toArray(), c:selected.material.color.getHex(), o:selected.material.opacity});
    if(selected.material.map){
      copy.material.map = selected.material.map;
      copy.material.needsUpdate = true;
    }
  }else{
    copy = selected.clone();
    copy.material = selected.material.clone();
    scene.add(copy);
    objects.push(copy);
  }
  copy.position.x += 0.5;
  select(copy);
  saveScene();
});
$('delBtn').addEventListener('click', function(){
  if(!selected) return;
  var m = selected;
  select(null);
  removeObject(m);
  saveScene();
});
$('lockBtn').addEventListener('click', function(){
  cameraLocked = !cameraLocked;
  orbit.enabled = !cameraLocked;
  this.classList.toggle('toggled', cameraLocked);
  toast(cameraLocked ? 'カメラを固定しました(編集専用)' : 'カメラ操作を有効にしました');
});
[['mTranslate','translate'],['mRotate','rotate'],['mScale','scale']].forEach(function(pair){
  $(pair[0]).addEventListener('click', function(){
    transform.setMode(pair[1]);
    ['mTranslate','mRotate','mScale'].forEach(function(id){ $(id).classList.toggle('on', id === pair[0]); });
  });
});
$('fov').addEventListener('input', function(){
  camera.fov = Number(this.value);
  camera.updateProjectionMatrix();
  $('fovVal').textContent = this.value + '°';
});
$('fishBtn').addEventListener('click', function(){
  fishOn = !fishOn;
  this.classList.toggle('toggled', fishOn);
  toast(fishOn ? '魚眼ON(端の方はギズモ操作がややズレます)' : '魚眼OFF');
});
$('fish').addEventListener('input', function(){
  fishK = Number(this.value) / 100 * 1.2;
  $('fishVal').textContent = this.value;
});
$('addFig').addEventListener('click', function(){ select(addFigure()); saveScene(); toast('人型を配置しました(身長160cm)'); });
$('roomBtn').addEventListener('click', function(){
  var wallC = 0xb2b8c2;
  addBox({p:[0,1.2,-2], r:[0,0,0], s:[4,2.4,0.1], c:wallC});
  var w2 = addBox({p:[-2,1.2,0], r:[0,0,0], s:[0.1,2.4,4], c:wallC});
  select(w2);
  saveScene();
  toast('壁2面を追加しました(高さ2.4m)');
});
var snapOn = false;
$('snapBtn').addEventListener('click', function(){
  snapOn = !snapOn;
  this.classList.toggle('toggled', snapOn);
  transform.setTranslationSnap(snapOn ? 0.25 : null);
  transform.setRotationSnap(snapOn ? Math.PI / 12 : null);
  if(transform.setScaleSnap) transform.setScaleSnap(snapOn ? 0.1 : null);
  toast(snapOn ? 'スナップON(移動0.25m・回転15°)' : 'スナップOFF');
});
$('heightIn').addEventListener('change', function(){
  if(!selected || !selected.userData.ar) return;
  var cm = Math.max(10, Math.min(1000, Number(this.value) || 160));
  this.value = cm;
  var h = cm / 100;
  var bottom = selected.position.y - selected.scale.y / 2;
  selected.scale.set(h * selected.userData.ar, h, 1);
  selected.position.y = bottom + h / 2;
  saveScene();
});
$('campreset').addEventListener('change', function(){
  var v = this.value;
  this.value = '';
  if(!v) return;
  var t = orbit.target;
  var dir = new THREE.Vector3().subVectors(camera.position, t);
  dir.y = 0;
  var dist = dir.length();
  if(dist < 0.5){ dir.set(0.6, 0, 0.8); dist = 6; } else { dir.normalize(); }
  if(v === 'eye'){ t.y = 1.6; camera.position.set(t.x + dir.x*Math.max(dist,3), 1.6, t.z + dir.z*Math.max(dist,3)); }
  else if(v === 'low'){ t.y = 1.4; camera.position.set(t.x + dir.x*Math.max(dist,3), 0.3, t.z + dir.z*Math.max(dist,3)); }
  else if(v === 'high'){ t.y = 0.6; camera.position.set(t.x + dir.x*Math.max(dist,4), 4.5, t.z + dir.z*Math.max(dist,4)); }
  else if(v === 'top'){ t.y = 0; camera.position.set(t.x + dir.x*0.01, 7, t.z + dir.z*0.01); }
  saveScene();
});
$('vpBtn').addEventListener('click', function(){
  vpOn = !vpOn;
  this.classList.toggle('toggled', vpOn);
  toast(vpOn ? 'パース線ON(選択中の箱の軸で表示)' : 'パース線OFF');
});
var guideMode = 0;
var GUIDE_NAMES = ['三分割', '対角線', '三分割+対角線', 'ガイドなし'];
function applyGuide(){
  var f = $('frame');
  f.classList.toggle('no3', guideMode === 1 || guideMode === 3);
  f.classList.toggle('gd', guideMode === 1 || guideMode === 2);
}
$('guideBtn').addEventListener('click', function(){
  guideMode = (guideMode + 1) % 4;
  applyGuide();
  saveScene();
  toast('構図ガイド: ' + GUIDE_NAMES[guideMode]);
});
$('flipBtn').addEventListener('click', function(){
  var on = document.body.classList.toggle('flip');
  this.classList.toggle('toggled', on);
  toast(on ? '左右反転(確認用。ドラッグ操作は左右逆になります)' : '反転解除');
});
$('opacity').addEventListener('input', function(){
  if(!selected) return;
  var v = Number(this.value) / 100;
  selected.material.opacity = v;
  var t = v < 1 || selected.userData.type !== 'box';
  if(selected.material.transparent !== t){
    selected.material.transparent = t;
    selected.material.needsUpdate = true;
  }
});
$('aspect').addEventListener('change', function(){ updateFrame(); saveScene(); });
$('exportBtn').addEventListener('click', exportPNG);
$('resetBtn').addEventListener('click', function(){
  if(confirm('シーンを全て消去してリセットしますか?')){
    localStorage.removeItem(SAVE_KEY);
    location.reload();
  }
});
window.addEventListener('resize', function(){
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  sizeRT();
  updateFrame();
});

/* ---------- init ---------- */
if(!restoreScene()){
  addBox({p:[0,0.5,0], r:[0,0,0], s:[1,1,1]});
  addBox({p:[1.6,0.75,-1.2], r:[0,0.5,0], s:[1.2,1.5,1.2]});
}
fishK = Number($('fish').value) / 100 * 1.2;
updateFrame();
toast('1本指: 回転・選択 / 2本指: ズーム・移動(上下でアイレベル調整)');

function animate(){
  requestAnimationFrame(animate);
  orbit.update();
  updateHorizon();
  updateVP();
  $('camH').textContent = camera.position.y.toFixed(2) + 'm';
  renderFrame();
}
animate();
})();
</script>
</body>
</html>
